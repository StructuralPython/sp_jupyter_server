; ── ttyd (web terminal) ───────────────────────────────────────────────────────
[program:ttyd]
command=/usr/local/bin/ttyd
    --port 7681
    --interface 127.0.0.1
    --writable
    login -f engineering
user=root
autostart=true
autorestart=true
startsecs=3
startretries=5
stdout_logfile=/var/log/ttyd.log
stderr_logfile=/var/log/ttyd.err
environment=HOME="/home/engineering",TERM="xterm-256color"

; ── Tabula web app ────────────────────────────────────────────────────────────
[program:tabula]
command=/usr/bin/java -Dfile.encoding=utf-8 -Xms256M -Xmx1024M -Dwarbler.port=9999 -jar /usr/local/bin/tabula-web/tabula/tabula.jar
user=engineering
autostart=true
autorestart=true
startsecs=8
startretries=5
stdout_logfile=/var/log/tabula.log
stderr_logfile=/var/log/tabula.err
environment=HOME="/home/engineering"