[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/var/run/supervisord.pid
loglevel=info

; ── Caddy (reverse proxy) ─────────────────────────────────────────────────────
[program:caddy]
command=/usr/bin/caddy run --config /config/caddy/Caddyfile --adapter caddyfile
user=root
autostart=true
autorestart=true
startsecs=3
startretries=5
stdout_logfile=/var/log/caddy.log
stderr_logfile=/var/log/caddy.err
environment=HOME="/root",XDG_DATA_HOME="/config/caddy/.local"

; ── TinyAuth (authentication) ─────────────────────────────────────────────────
; entrypoint.sh writes /config/tinyauth/tinyauth.env before supervisord starts.
; We source it via a shell wrapper so the bcrypt hash and db path are picked up.
[program:tinyauth]
command=/bin/sh -c 'set -a; . /config/tinyauth/tinyauth.env; set +a; exec /usr/local/bin/tinyauth'
user=root
autostart=true
autorestart=true
startsecs=3
startretries=5
stdout_logfile=/var/log/tinyauth.log
stderr_logfile=/var/log/tinyauth.err

; ── JupyterLab ────────────────────────────────────────────────────────────────
[program:jupyterlab]
command=/home/engineering/.venv/bin/jupyter lab
    --config=/home/engineering/.jupyter/jupyter_lab_config.py
    --no-browser
user=engineering
autostart=true
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/var/log/jupyterlab.log
stderr_logfile=/var/log/jupyterlab.err
environment=
    HOME="/home/engineering",
    PATH="/home/engineering/.venv/bin:/usr/local/bin:/usr/bin:/bin",
    VIRTUAL_ENV="/home/engineering/.venv"

; ── code-server (VS Code) ─────────────────────────────────────────────────────
[program:code-server]
command=/usr/bin/code-server
    --bind-addr 127.0.0.1:8081
    --auth none
    --user-data-dir /config/code-server/user-data
    --extensions-dir /config/code-server/extensions
    /home/engineering/work
user=engineering
autostart=true
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/var/log/code-server.log
stderr_logfile=/var/log/code-server.err
environment=
    HOME="/home/engineering",
    PATH="/home/engineering/.venv/bin:/usr/local/bin:/usr/bin:/bin"