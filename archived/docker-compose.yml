version: '3.8'

# Bunny.net auto-generated form configuration
x-bunny-configuration:
  variables:
    - name: DOMAIN_NAME
      label: "Server Domain"
      description: "The generated bunny.net hostname (e.g., your-app.b-cdn.net)"
    - name: AUTHELIA_EMAIL
      label: "Admin Email"
      description: "Email for SSL and Admin login"
    - name: AUTHELIA_PASSWORD
      label: "Admin Password"
      description: "Password for Jupyter and VS Code"
      type: password
    - name: INITIAL_PYTHON_PACKAGES
      label: "Initial Python Packages"
      description: "Extra packages to install via uv"
      default: "structural_starterkit"

services:
  app:
    build: .
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - AUTHELIA_EMAIL=${AUTHELIA_EMAIL}
      - AUTHELIA_PASSWORD=${AUTHELIA_PASSWORD}
      - INITIAL_PYTHON_PACKAGES=${INITIAL_PYTHON_PACKAGES}
    volumes:
      - engineer-data:/home/engineering
      - app-config:/config
    restart: always

  authelia:
    image: authelia/authelia:latest
    volumes:
      - app-config:/config
    restart: always

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - app-config:/etc/caddy
      - app-config:/config/caddy_data
    depends_on:
      - authelia
      - app
    restart: always

volumes:
  engineer-data:  # Corrected: underscore replaced with hyphen
  app-config:     # Corrected: underscore replaced with hyphen